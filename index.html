<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobs&Gigs</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .header-bg { background: linear-gradient(135deg, #b91c1c 0%, #991b1b 100%); }
    </style>
</head>
<body class="bg-gray-50">

<nav class="bg-white border-b sticky top-0 z-50 shadow-sm">
    <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-11 h-11 bg-red-600 rounded-2xl flex items-center justify-center text-white">
                <i class="fas fa-briefcase text-3xl"></i>
            </div>
            <span class="text-3xl font-bold tracking-tighter">Jobs<span class="text-red-600">&amp;Gigs</span></span>
        </div>
    </div>
</nav>

<div id="home-page" class="min-h-screen">
    <header class="header-bg text-white py-24 text-center">
        <h1 class="text-6xl font-bold mb-4">Jobs&Gigs</h1>
        <p class="text-xl">Find meaningful jobs and gigs</p>
    </header>
    <div class="max-w-7xl mx-auto px-6 py-12">
        <h2 class="text-3xl font-semibold mb-8">Latest Opportunities</h2>
        <div id="jobs-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>
</div>

<!-- ADMIN LOGIN -->
<div id="admin-login" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
    <div class="bg-white rounded-3xl p-10 w-full max-w-md">
        <h3 class="text-2xl font-semibold mb-6 text-center">Admin Login</h3>
        <input id="email" type="email" placeholder="Email" class="w-full px-6 py-4 border rounded-2xl mb-4">
        <input id="password" type="password" placeholder="Password" class="w-full px-6 py-4 border rounded-2xl mb-6">
        <button onclick="loginAdmin()" class="w-full py-4 bg-red-600 text-white rounded-2xl font-semibold">Login</button>
    </div>
</div>

<!-- ADMIN DASHBOARD -->
<div id="admin-dashboard" class="hidden max-w-7xl mx-auto px-6 py-12">
    <div class="flex justify-between items-center mb-10">
        <h2 class="text-4xl font-bold">Admin Portal</h2>
        <button onclick="logoutAdmin()" class="px-6 py-3 bg-red-600 text-white rounded-2xl">Logout</button>
    </div>
    <p class="text-center text-lg py-20">✅ Admin Dashboard Ready</p>
</div>

<script>
// === CHANGE THESE ===
const SUPABASE_URL = 'https://usgjrtcvcrpqqocvleny.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVzZ2pydGN2Y3JwcXFvY3ZsZW55Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4MDg2OTgsImV4cCI6MjA5NTM4NDY5OH0.0ju7BrUueQhldAyya--NZYctJ4AOhTll4eop45fVpZc';

const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function showAdmin() {
    document.getElementById('admin-login').classList.remove('hidden');
}

async function loginAdmin() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const { error } = await supabase.auth.signInWithPassword({ email, password });
    if (error) alert(error.message);
    else {
        document.getElementById('admin-login').classList.add('hidden');
        document.getElementById('admin-dashboard').classList.remove('hidden');
    }
}

async function logoutAdmin() {
    await supabase.auth.signOut();
    document.getElementById('admin-dashboard').classList.add('hidden');
}

// Auto open admin if ?admin=secret
if (window.location.search.includes('admin=secret')) {
    showAdmin();
}
</script>
</body>
</html>
